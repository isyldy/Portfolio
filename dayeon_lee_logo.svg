<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">DAYEON Lee logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Minimal typographic logo for DAYEON Lee featuring stylized letterforms and a geometric accent mark</desc>

  

  <!-- Geometric accent: a delicate circle with crosshair reminiscent of a calendar / design compass -->
  <g transform="translate(340, 110)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- outer ring -->
    <circle cx="0" cy="0" r="42" stroke="#2c2825" stroke-width="0.6" fill="none" opacity="0.12" style="fill:none;stroke:rgb(44, 40, 37);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.12;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- inner ring -->
    <circle cx="0" cy="0" r="30" stroke="#b8977e" stroke-width="0.7" fill="none" opacity="0.55" style="fill:none;stroke:rgb(184, 151, 126);color:rgb(0, 0, 0);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- small center dot -->
    <circle cx="0" cy="0" r="3" opacity="0.9" style="fill:rgb(184, 151, 126);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- cross lines -->
    <line x1="-42" y1="0" x2="-32" y2="0" opacity="0.35" style="fill:none;stroke:rgb(184, 151, 126);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="32" y1="0" x2="42" y2="0" opacity="0.35" style="fill:none;stroke:rgb(184, 151, 126);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="0" y1="-42" x2="0" y2="-32" opacity="0.35" style="fill:none;stroke:rgb(184, 151, 126);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="0" y1="32" x2="0" y2="42" opacity="0.35" style="fill:none;stroke:rgb(184, 151, 126);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- tiny arc accent top-right -->
    <path d="M 21.2 -21.2 A 30 30 0 0 1 30 0" stroke="#b8977e" stroke-width="1.4" fill="none" opacity="0.8" style="fill:none;stroke:rgb(184, 151, 126);color:rgb(0, 0, 0);stroke-width:1.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- D mark — stylized initial, sits left of circle -->
  <text x="255" y="127" font-size="68" text-anchor="middle" font-style="italic" opacity="0.08" style="fill:rgb(44, 40, 37);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.08;font-family:&quot;Cormorant Garamond&quot;, Georgia, serif;font-size:68px;font-weight:300;font-style:italic;text-anchor:middle;dominant-baseline:auto">D</text>

  <!-- DAYEON — large display -->
  <text x="340" y="210" font-size="62" text-anchor="middle" letter-spacing="0.14em" style="fill:rgb(44, 40, 37);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Cormorant Garamond&quot;, Georgia, serif;font-size:62px;font-weight:300;text-anchor:middle;dominant-baseline:auto">DAYEON</text>

  <!-- thin rule -->
  <line x1="200" y1="226" x2="480" y2="226" style="fill:rgb(0, 0, 0);stroke:rgb(44, 40, 37);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Lee — spaced small caps feel -->
  <text x="340" y="256" font-size="17" text-anchor="middle" style="fill:rgb(44, 40, 37);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Cormorant Garamond&quot;, Georgia, serif;font-size:17px;font-weight:400;text-anchor:middle;dominant-baseline:auto">LEE</text>

  <!-- monogram label bottom -->
  <text x="340" y="290" font-size="10" text-anchor="middle" letter-spacing="0.22em" opacity="0.6" style="fill:rgb(184, 151, 126);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;DM Mono&quot;, &quot;Courier New&quot;, monospace;font-size:10px;font-weight:400;text-anchor:middle;dominant-baseline:auto">DESIGNER &amp; CREATOR</text>

  <!-- two tiny decorative dots flanking the bottom label -->
  <circle cx="228" cy="286" r="1.6" opacity="0.45" style="fill:rgb(184, 151, 126);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.45;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="452" cy="286" r="1.6" opacity="0.45" style="fill:rgb(184, 151, 126);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.45;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>